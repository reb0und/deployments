---
apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  name: k3s-default
servers: 1
agents: 0
image: docker.io/rancher/k3s:v1.36.0-k3s1
volumes:
  - volume: "$PWD/k3s/resolv.conf:/etc/k3s-resolv.conf"
    nodeFilters:
      - server:*
options:
  k3s:
    extraArgs:
      - arg: "--resolv-conf=/etc/k3s-resolv.conf"
        nodeFilters:
          - server:*
      - arg: "--disable-network-policy"
        nodeFilters:
          - server:*
      - arg: "--flannel-backend=none"
        nodeFilters:
          - server:*
      - arg: "--disable-kube-proxy"
        nodeFilters:
          - server:*
      - arg: "--disable=servicelb"
        nodeFilters:
          - server:*
      - arg: "--disable=traefik"
        nodeFilters:
          - server:*
      - arg: "--disable=metrics-server"
        nodeFilters:
          - server:*
