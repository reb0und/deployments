apiVersion: apps/v1
kind: Deployment
metadata:
  name: prowlarr
  namespace: kube-system
  labels:
    app: prowlarr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prowlarr
  template:
    metadata:
      labels:
        app: prowlarr
    spec:
      containers:
        - name: prowlarr
          image: lscr.io/linuxserver/prowlarr:latest
          volumeMounts:
            - mountPath: "/config"
              name: config
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "Etc/UTC"
          ports: 
            - containerPort: 9696
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: prowlarr-config
