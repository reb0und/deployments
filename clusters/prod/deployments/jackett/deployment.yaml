apiVersion: apps/v1
kind: Deployment
metadata:
  name: jackett
  namespace: kube-system
  labels:
    app: jackett
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jackett
  template:
    metadata:
      labels:
        app: jackett
    spec:
      containers:
        - name: jackett
          image: lscr.io/linuxserver/jackett:latest
          volumeMounts:
            - mountPath: "/config"
              name: config
            - mountPath: "/media"
              name: media
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "Etc/UTC"
            - name: AUTOUPDATE
              value: "true"
          ports: 
            - containerPort: 9117
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: jackett-config
        - name: media
          persistentVolumeClaim:
            claimName: jellyfin-media
