apiVersion: apps/v1
kind: Deployment
metadata:
  name: radarr
  namespace: kube-system
  labels:
    app: radarr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: radarr
  template:
    metadata:
      labels:
        app: radarr
    spec:
      containers:
        - name: radarr
          image: lscr.io/linuxserver/radarr:latest
          volumeMounts:
            - mountPath: "/config"
              name: config
            - mountPath: "/media"
              name: media
            - mountPath: "/downloads"
              name: downloads
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "Etc/UTC"
          ports: 
            - containerPort: 7878
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: radarr-config
        - name: media
          persistentVolumeClaim:
            claimName: jellyfin-media
        - name: downloads
          persistentVolumeClaim:
            claimName: qbittorrent-downloads
