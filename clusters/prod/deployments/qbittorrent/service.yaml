apiVersion: v1
kind: Service
metadata:
  name: qbittorrent
  namespace: kube-system
spec:
  type: NodePort
  selector:
    app: qbittorrent
  ports:
    - name: web
      protocol: TCP
      port: 8080
      targetPort: 8080
    - name: torrent-tcp
      protocol: TCP
      port: 6881
      targetPort: 6881
      nodePort: 30003
    - name: torrent-udp
      protocol: UDP
      port: 6881
      targetPort: 6881
      nodePort: 30004
