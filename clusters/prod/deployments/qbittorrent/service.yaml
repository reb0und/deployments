apiVersion: v1
kind: Service
metadata:
  name: radarr
  namespace: kube-system
spec:
  selector:
    app: radarr
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
    - protocol: TCP
      port: 6881
      targetPort: 6881
    - protocol: UDP
      port: 6881
      targetPort: 6881
