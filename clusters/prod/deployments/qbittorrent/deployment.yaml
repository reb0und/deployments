apiVersion: apps/v1
kind: Deployment
metadata:
  name: qbittorrent
  namespace: kube-system
  labels:
    app: qbittorrent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qbittorrent
  template:
    metadata:
      labels:
        app: qbittorrent
    spec:
      initContainers:
        - name: perms
          image: busybox:latest
          volumeMounts:
            - mountPath: "/media"
              name: media
            - mountPath: "/config"
              name: config
          command:
            - sh
            - -c
            - |
              mkdir -p /media
              chown -R 1000:1000 /media
              chmod -R u+rwX,g+rwX /media
              mkdir -p /media/downloads/radarr /media/downloads/tv-sonarr /media/film /media/tv
              chown -R 1000:1000 /media/downloads /media/film /media/tv
              chmod -R u+rwX,g+rwX /media/downloads /media/film /media/tv

              CONF=/config/qBittorrent/qBittorrent.conf
              mkdir -p /config/qBittorrent
              touch "$CONF"

              grep -q 'WebUI\\AuthSubnetWhitelistEnabled' "$CONF" \
                && sed -i 's#WebUI\\AuthSubnetWhitelistEnabled=.*#WebUI\\AuthSubnetWhitelistEnabled=true#' "$CONF" \
                || echo 'WebUI\AuthSubnetWhitelistEnabled=true' >> "$CONF"

              grep -q 'WebUI\\AuthSubnetWhitelist=' "$CONF" \
                && sed -i 's#WebUI\\AuthSubnetWhitelist=.*#WebUI\\AuthSubnetWhitelist=0.0.0.0/0#' "$CONF" \
                || echo 'WebUI\AuthSubnetWhitelist=0.0.0.0/0' >> "$CONF"

              grep -q 'WebUI\\HostHeaderValidation' "$CONF" \
                && sed -i 's#WebUI\\HostHeaderValidation=.*#WebUI\\HostHeaderValidation=false#' "$CONF" \
                || echo 'WebUI\HostHeaderValidation=false' >> "$CONF"

              grep -q 'WebUI\\ServerDomains' "$CONF" \
                && sed -i 's#WebUI\\ServerDomains=.*#WebUI\\ServerDomains=*#' "$CONF" \
                || echo 'WebUI\ServerDomains=*' >> "$CONF"
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: qbittorrent
          image: lscr.io/linuxserver/qbittorrent:latest
          volumeMounts:
            - mountPath: "/config"
              name: config
            - mountPath: "/media"
              name: media
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "Etc/UTC"
            - name: WEBUI_PORT
              value: "8080"
            - name: TORRENTING_PORT
              value: "6881"
          ports: 
            - containerPort: 8080
            - containerPort: 6881
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: qbittorrent-config
        - name: media
          persistentVolumeClaim:
            claimName: jellyfin-media
