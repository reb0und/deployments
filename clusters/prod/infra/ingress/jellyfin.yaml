apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo
  namespace: kube-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: echo
  template:
    metadata:
      labels:
        app: echo
    spec:
      containers:
        - name: echo
          image: hashicorp/http-echo:1.0
          args:
            - "-text=hello from cilium gateway"
          ports:
            - containerPort: 5678
---
apiVersion: v1
kind: Service
metadata:
  name: echo
  namespace: kube-system
spec:
  selector:
    app: echo
  ports:
    - name: http
      port: 80
      targetPort: 5678
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: echo-route
  namespace: kube-system
spec:
  parentRefs:
    - name: web-gw
      namespace: kube-system
  rules:
    - backendRefs:
        - name: echo
          port: 80
