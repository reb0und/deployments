---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: kube-system
spec:
  chartRef:
    kind: OCIRepository
    name: cilium
    namespace: flux-system
  interval: 1m0s
  values:
    # devices:
    #   - wg0
    nodePort:
      enabled: true
    encryption:
      enabled: false
    gatewayAPI:
      enabled: true
      hostNetwork:
        enabled: true
    kubeProxyReplacement: true
    operator:
      replicas: 1
    ipv4NativeRoutingCIDR: ""
    ipam:
      operator:
        clusterPoolIPv4PodCIDRList: "10.42.0.0/16"
      mode: kubernetes
