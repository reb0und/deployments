---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: kube-system
spec:
  chartRef:
   kind: OCIRepository
   name: traefik
   namespace: flux-system
  interval: 10m0s
  values:
    providers:
      kubernetesCRD:
        enabled: false
      kubernetesGateway:
        enabled: true
        experimentalChannel: true
    service:
      type: NodePort
    gateway:
      enabled: false
    ports:
      web:
        port: 8000
        protocol: TCP
        expose: 
          default: true
        nodePort: 30001
        exposedPort: 8080
      web-internal:
        port: 8001
        protocol: TCP
        expose: 
          default: true
        nodePort: 30002
        exposedPort: 8001
      jellyfin:
        port: 8002
        protocol: TCP
        expose: 
          default: true
        nodePort: 30005
        exposedPort: 8002
      test:
        port: 3000
        protocol: TCP
        expose: 
          default: true
        nodePort: 30000
        exposedPort: 3000
