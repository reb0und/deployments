---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: kube-system
spec:
  chartRef:
   kind: OCIRepository
   name: traefik
   namespace: flux-system
  interval: 10m0s
  values:
    deployment:
      kind: DaemonSet
    updateStrategy:
      rollingUpdate:
        maxUnavailable: 1
        maxSurge: 0
    hostNetwork: true
    providers:
      kubernetesCRD:
        enabled: false
      kubernetesGateway:
        enabled: true
        experimentalChannel: true
    service:
      enabled: false
    gateway:
      enabled: false
    ports:
      web:
        port: 80
        containerPort: 80
        protocol: TCP
        hostPort: 80
      test:
        port: 3000
        containerPort: 3000
        protocol: TCP
        hostPort: 3000
    securityContext:
      capabilities:
        add:
          - NET_BIND_SERVICE
