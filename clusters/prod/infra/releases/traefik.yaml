---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: kube-system
spec:
  chartRef:
   kind: OCIRepository
   name: traefik
   namespace: flux-system
  interval: 10m0s
  values:
    providers:
      kubernetesGateway:
        enabled: true
        experimentalChannel: true
    service:
      type: NodePort
    ports:
      test:
        port: 8080
        protocol: TCP
        expose: 
          default: true
        nodePort: 30001
        exposedPort: 8080
      test:
        port: 3000
        protocol: TCP
        expose: 
          default: true
        nodePort: 30000
        exposedPort: 3000
