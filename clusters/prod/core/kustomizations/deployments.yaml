---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: deployments
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./clusters/prod/deployments
  prune: true
  retryInterval: 1m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
  timeout: 2m0s
  wait: true
