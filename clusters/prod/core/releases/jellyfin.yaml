---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin
  namespace: kube-system
spec:
  chart:
    spec:
      chart: jellyfin
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: jellyfin
        namespace: flux-system
      version: '>=3.2.0'
  values:
    persistence:
      config:
        enabled: true
        size: 5Gi
        storageClass: ''
      media:
        enabled: true
        size: 100Gi
        storageClass: ''
  interval: 10m0s
