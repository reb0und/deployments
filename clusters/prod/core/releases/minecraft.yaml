---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: minecraft
  namespace: kube-system
spec:
  chart:
    spec:
      chart: minecraft
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: minecraft
        namespace: flux-system
      version: '>=5.1.3'
  interval: 10m0s
  values:
    minecraftServer:
      eula: "TRUE"
      motd: "hi"
      difficulty: normal
      type: "FORGE"
      downloadModpackUrl: "https://www.curseforge.com/minecraft/share/jIOfJ034"
