---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: minecraft
  namespace: kube-system
spec:
  chart:
    spec:
      chart: minecraft
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: minecraft
        namespace: flux-system
      version: '>=5.1.3'
  interval: 10m0s
  values:
    image:
      repository: itzp/minecraft-server
      tag: stable-java17
    persistence:
      dataDir:
        enabled: true
        Size: 50Gi
    minecraftServer:
      eula: "TRUE"
      motd: "hi"
      difficulty: normal
      type: "CURSEFORGE"
      version: "1.20.1"
      cfServerMod: "/data/atm-server.zip"
